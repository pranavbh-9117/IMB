            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
      security:
      - BearerAuth: []
      summary: Cancel Leave
      tags:
      - Leave
    put:
      consumes:
      - application/json
      description: Approves or rejects a leave request. Enforces hierarchical RBAC
        (Faculty approves Student, Inst Admin approves Faculty).
      parameters:
      - description: Leave Request ID
        in: path
        name: id
        required: true
        type: string
      - description: Process Details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_pranavbh-9117_IMB_internal_leave_dto.ProcessLeaveRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Leave Request Processed
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerResponse-github_com_pranavbh-9117_IMB_internal_leave_dto_LeaveResponse'
        "400":
