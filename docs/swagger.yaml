host: localhost:8080
info:
  contact: {}
  description: API documentation for the Institute Management Platform.
  title: Institute Management Backend API
  version: "1.0"
paths:
  /auth/change-password:
    post:
      consumes:
      - application/json
      description: Changes the authenticated user's password and revokes all active
        sessions.
      parameters:
      - description: Change Password Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_pranavbh-9117_IMB_internal_auth_dto.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Password Changed Successfully
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerResponse-any'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
      security:
      - BearerAuth: []
      summary: Change Password
      tags:
      - Authentication
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user and returns a JWT access token in the body
        and a refresh token in an HttpOnly cookie.
      parameters:
      - description: Login Credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_pranavbh-9117_IMB_internal_auth_dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login Successful
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerResponse-github_com_pranavbh-9117_IMB_internal_auth_dto_LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
      summary: User Login
      tags:
      - Authentication
  /auth/logout:
    post:
      description: Revokes the refresh token and clears the HttpOnly cookie.
      produces:
      - application/json
      responses:
        "200":
          description: Logout Successful
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerResponse-any'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
      summary: User Logout
      tags:
      - Authentication
  /auth/refresh:
    post:
      description: Reads the refresh token from the HttpOnly cookie, rotates it, and
        returns a new access token.
      produces:
      - application/json
      responses:
        "200":
          description: Token Refreshed
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerResponse-github_com_pranavbh-9117_IMB_internal_auth_dto_RefreshResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
      summary: Refresh Token
      tags:
      - Authentication
  /institutions:
    get:
      description: Retrieves a paginated list of institutions. Accessible only by
        Super Admin.
      parameters:
      - default: 0
        description: Pagination offset
        in: query
        name: offset
        type: integer
      - default: 10
        description: Pagination limit
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Institutions Retrieved
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerResponse-array_github_com_pranavbh-9117_IMB_internal_institution_dto_InstitutionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
      security:
      - BearerAuth: []
      summary: List Institutions
      tags:
      - Institution
    post:
      consumes:
      - application/json
      description: Creates a new institution. Accessible only by Super Admin.
      parameters:
      - description: Institution Details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_pranavbh-9117_IMB_internal_institution_dto.CreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Institution Created
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerResponse-github_com_pranavbh-9117_IMB_internal_institution_dto_InstitutionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
      security:
      - BearerAuth: []
      summary: Create Institution
      tags:
      - Institution
  /institutions/{id}:
    delete:
      description: Soft-deletes an institution by its UUID. Accessible only by Super
        Admin.
      parameters:
      - description: Institution ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Institution Deleted
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerResponse-any'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete Institution
      tags:
      - Institution
    get:
      description: Retrieves an institution by its UUID. Accessible only by Super
        Admin.
      parameters:
      - description: Institution ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Institution Retrieved
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerResponse-github_com_pranavbh-9117_IMB_internal_institution_dto_InstitutionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
      security:
      - BearerAuth: []
      summary: Get Institution
      tags:
      - Institution
    patch:
      consumes:
      - application/json
      description: Partially updates an institution. Accessible only by Super Admin.
      parameters:
      - description: Institution ID
        in: path
        name: id
        required: true
        type: string
      - description: Update Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_pranavbh-9117_IMB_internal_institution_dto.UpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Institution Updated
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerResponse-github_com_pranavbh-9117_IMB_internal_institution_dto_InstitutionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
      security:
      - BearerAuth: []
      summary: Update Institution
      tags:
      - Institution
  /leaves:
    get:
      description: Retrieves a paginated list of leaves. Pass '?view=approvals' to
        see leaves pending your review.
      parameters:
      - default: 0
        description: Pagination offset
        in: query
        name: offset
        type: integer
      - default: 10
        description: Pagination limit
        in: query
        name: limit
        type: integer
      - description: View mode (approvals or empty)
        in: query
        name: view
        type: string
      - description: Filter by status (pending, approved, rejected, cancelled)
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Leaves Retrieved
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerResponse-array_github_com_pranavbh-9117_IMB_internal_leave_dto_LeaveResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
      security:
      - BearerAuth: []
      summary: List Leaves
      tags:
      - Leave
    post:
      consumes:
      - application/json
      description: Submits a new leave request. Allowed for Faculty and Students.
      parameters:
      - description: Leave Request Details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_pranavbh-9117_IMB_internal_leave_dto.ApplyLeaveRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Leave Request Submitted
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerResponse-github_com_pranavbh-9117_IMB_internal_leave_dto_LeaveResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
        "409":
          description: Conflict (Overlap)
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
      security:
      - BearerAuth: []
      summary: Apply for Leave
      tags:
      - Leave
  /leaves/{id}:
    delete:
      description: Cancels a pending leave request belonging to the caller.
      parameters:
      - description: Leave Request ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Leave Cancelled
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerResponse-any'
        "400":
          description: Bad Request
