host: localhost:8080
info:
  contact: {}
  description: API documentation for the Institute Management Platform.
  title: Institute Management Backend API
  version: "1.0"
paths:
  /admin/dashboard:
    get:
      description: Retrieves aggregated dashboard metrics (student count, faculty
        count, quiz count, leave statistics) for the admin's institution.
      produces:
      - application/json
      responses:
        "200":
          description: Dashboard Retrieved
          headers:
            X-Cache:
              description: HIT or MISS
              type: string
            X-Cache-TTL:
              description: Configured cache TTL in seconds
              type: string
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerResponse-github_com_pranavbh-9117_IMB_internal_dashboard_dto_AdminDashboardData'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
      security:
      - BearerAuth: []
      summary: Get Admin Dashboard
      tags:
      - Dashboard
  /auth/change-password:
    post:
      consumes:
      - application/json
      description: Changes the authenticated user's password and revokes all active
        sessions.
      parameters:
      - description: Change Password Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_pranavbh-9117_IMB_internal_auth_dto.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Password Changed Successfully
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerResponse-any'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
      security:
      - BearerAuth: []
      summary: Change Password
      tags:
      - Authentication
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Sends a password reset email if the email is registered.
      parameters:
      - description: User Email
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_pranavbh-9117_IMB_internal_auth_dto.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Reset Link Sent
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerResponse-any'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
      summary: Forgot Password
      tags:
      - Authentication
  /auth/google/callback:
    get:
      description: Handles the callback from Google and returns standard login response.
      parameters:
      - description: OAuth Authorization Code
        in: query
        name: code
        required: true
        type: string
      - description: OAuth State Parameter
        in: query
        name: state
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Google Login Successful
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerResponse-github_com_pranavbh-9117_IMB_internal_auth_dto_LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
      summary: Google OAuth Callback
      tags:
      - Authentication
  /auth/google/login:
    get:
      description: Initiates the Google OAuth authorization code flow.
      produces:
      - application/json
      responses:
        "302":
          description: Redirects to Google
      summary: Google OAuth Login
      tags:
      - Authentication
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user and returns a JWT access token in the body
        and a refresh token in an HttpOnly cookie.
      parameters:
      - description: Login Credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_pranavbh-9117_IMB_internal_auth_dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login Successful
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerResponse-github_com_pranavbh-9117_IMB_internal_auth_dto_LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
      summary: User Login
      tags:
      - Authentication
  /auth/logout:
    post:
      description: Revokes the refresh token and clears the HttpOnly cookie.
      produces:
      - application/json
      responses:
        "200":
          description: Logout Successful
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerResponse-any'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
      summary: User Logout
      tags:
      - Authentication
  /auth/refresh:
    post:
      description: Reads the refresh token from the HttpOnly cookie, rotates it, and
        returns a new access token.
      produces:
      - application/json
      responses:
        "200":
          description: Token Refreshed
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerResponse-github_com_pranavbh-9117_IMB_internal_auth_dto_RefreshResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_pranavbh-9117_IMB_pkg_response.SwaggerErrorResponse'
      summary: Refresh Token
      tags:
      - Authentication
  /auth/reset-password:
    post:
      consumes:
      - application/json
      description: Resets user password using a valid reset token.
      parameters:
      - description: Token and New Password
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_pranavbh-9117_IMB_internal_auth_dto.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Password Reset Successfully
          schema:
